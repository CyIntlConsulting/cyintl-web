    url: "/en/solutions/#marketing"

joinus_title: "Join Us"
joinus:
  text: "We welcome partners and talents passionate about business, technology, education, and marketing to join CyIntl. Please send your resume or partnership proposal to info@cyintl.org. Let’s grow and create the future together."