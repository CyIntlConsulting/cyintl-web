author: "Cleo"
summary: "CyIntl（发音为 '思因'）是一家深耕教育、科技、商业与终端营销的综合性咨询平台。我们相信时间与复利的力量，致力于为个人及机构整合核心资源、发掘潜在增长，驱动产业的现代化转型，思其因、得其果, 共同重塑未来蓝图。"
location: "CyIntl 于 2021 年成立。总部位于加拿大温哥华，立足北美，专注于环太平洋地区并辐射全球。CyIntl目前正以稳健的步伐，沿着充满前景的发展轨迹前进。"
partnerships: "CyIntl在全球范围、多行业内构建了稳固的战略合作伙伴关系。"
vision: "我们将客户视为一同前行的伙伴。优化社会资源的配置效率，助力实现‘居者有其屋，能者有其位’的理想政治状态。"
services:
  - name: "教育咨询"
    desc: "为教育机构和个人提供课程设计、国际交流、学业规划等全方位服务。"
  - name: "科技创新"
    desc: "推动数字化转型，助力企业实现技术升级与创新发展。"
  - name: "商业战略"
    desc: "为企业提供市场分析、品牌建设、运营优化等咨询服务。"
  - name: "终端营销"
    desc: "整合线上线下资源，提升品牌影响力与市场竞争力。"
