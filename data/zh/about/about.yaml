title: "关于CyIntl"
aliases:
  - "about-us"
  - "about-hugo"
  - "contact"
author: "Cleo"
summary: |
  CyIntl（思因国际）是一家深耕商业、科技、教育与终端营销的综合性战略咨询平台。我们秉持长期主义，整合全球资源，发掘增长动能。思因，方能得果；我们愿与您并肩，重构未来蓝图。
  CyIntl 于 2021 年成立于加拿大温哥华，立足北美，专注于环太平洋地区并辐射全球。CyIntl目前正以稳健的步伐，沿着充满前景的发展轨迹前进。

vision_title: "愿景与使命"
vision: "在CyIntl，我们希望通过优化社会资源的配置效率，来构建“人尽其才，物尽其用，各得其所”的终极理想。"

milestones_title: "发展历程"
milestones:
  - period: "2026 - 至今"
    event: "跨越式成长与资源链接"
    detail: "持续通过全链路资源整合，驱动合作伙伴在现代化转型中实现有确定性的成长。"
  - period: "2025"
    event: "立足北美，布局环太平洋"
    detail: "进一步扩展国际化布局，业务版图由北美西海岸覆盖至环太平洋地区，开启全球化服务新篇章。"
  - period: "2024"
    event: "全商业链条构建"
    detail: "进一步整合终端营销在内的全链条商业资源，扩大专业团队，逐步架构起涵盖教育、科技与商业的综合性服务体系。"
  - period: "2023"
    event: "业务扩展至教育与人才规划领域"
    detail: "将教育领域归入战略发展蓝图，引入该领域一线人才加入团队。通过参与项目设计与国际交流、合作办学等业务，探索更多发展可能。"
  - period: "2022"
    event: "精专技术领域咨询"
    detail: "赋能中小型企业, 以技术咨询为核心深耕温哥华本地市场，初步奠定品牌基石。"
  - period: "2021"
    event: "初心起航，扎根温哥华"
    detail: "CyIntl 成立于加拿大温哥华耶鲁镇。"

services_title: "核心服务"
services:
  - name: "商业战略"
    desc: "为企业提供数据驱动的市场分析、战略布局、运营优化等服务。"
    url: "/zh/solutions/#business"
  - name: "科技创新"
    desc: "推动数字化转型，助力传统企业实现技术升级与创新发展。"
    url: "/zh/solutions/#technology"
  - name: "教育咨询"
    desc: "为机构和个人链接合作办学机会、国际交流项目设计、学业规划陪跑等全方位服务。"
    url: "/zh/solutions/#education"
  - name: "终端营销"
    desc: "整合线上线下资源，多矩阵提升品牌影响力与市场竞争力。"
    url: "/zh/solutions/#marketing"

joinus_title: "加入我们"
joinus:
  text: "汇聚创新动能，共筑商业未来。CyIntl 持续关注商业、科技、教育与营销领域的的卓越人才。诚邀您将简历或合作提案发送至 info@cyintl.org，与我们一起开启成长的全新篇章。"
