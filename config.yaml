baseURL: "https://www.cyintl.org/"
theme: "up-business-theme"
defaultContentLanguage: "en" # Simplified to 'en' to match the language key
defaultContentLanguageInSubdir: true # Essential for clear /en/ and /zh/ routing

title: "CyIntl Consulting"
summaryLength: 20

# 1. ROOT LEVEL LANGUAGES (Moved out of params)
languages:
  en:
    contentDir: content/en
    languageName: English
    languageCode: en-US
    weight: 1
    title: "CyIntl Consulting"
    # English Menus
    menu:
      main:
        - name: "Home"
          url: "/"
          weight: 1
        - name: "Solutions"
          url: "/en/solutions"
          weight: 2
        - name: "Team"
          url: "/en/team"
          weight: 3
        - name: "Vision"
          url: "/en/vision"
          weight: 4
        - name: "About"
          url: "/en/about"
          weight: 5
      buttons:
        - name: "Book an appointment"
          url: "https://calendly.com/cyintl"
          weight: 6
          pre: "btn btn-primary text-light"

  zh:
    contentDir: content/zh
    languageName: "中文"
    languageCode: zh-CN
    weight: 2
    title: "思因国际咨询"
    # Chinese Menus
    menu:
      main:
        - name: "首页"
          url: "/zh"
          weight: 1
        - name: "解决方案"
          url: "/zh/solutions"
          weight: 2
        - name: " 团队"
          url: "/zh/team"
          weight: 3
        - name: "发展愿景"
          url: "/zh/vision"
          weight: 4
        - name: "关于"
          url: "/zh/about"
          weight: 5
      buttons:
        - name: "预约咨询"
          url: "https://calendly.com/cyintl"
          weight: 6
          pre: "btn btn-primary text-light"

