<section class="section services py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-6">
        {{ with .title }}
          <h3 class="fs-5 fw-semibold text-primary text-center">{{ . }}</h3>
        {{ end }}
        {{ with .text }}
          <p class="small text-black-61 text-center">{{ . }}</p>
        {{ end }}
      </div>
    </div>
    <div class="row g-5">
      {{ range .content.cards }}
        <div class="col-12 col-xl-4">
          <div class="card bg-blue-16 border-0 border-radius-34 p-4">
            <div class="card-body text-center">
            {{ with .image }}
                <div class="pb-3">
                  <img src="{{ . | absURL }}" alt="icon" style="width: 60px; height: 60px; margin: 0 auto;">
                </div>
              {{ end }}
              {{ with .title }}<h4 class="card-title text-center text-primary pb-4">{{ . }}</h4>{{ end }}
              {{ with .text }}<p class="card-text text-black-61 pb-4">{{ . }}</p>{{ end }}
              {{ with .button }}<a class="btn btn-outline-primary px-4" href="{{ .url }}">{{ .label }}</a>{{ end }}
            </div>
          </div>
        </div>
      {{ end }}
    </div>
  </div>
</section>
